[tools]
claude = "latest"
gemini = "latest"
pandoc = "latest"
"pipx:weasyprint" = "latest"
"aqua:gastownhall/beads" = "latest"
committed = "latest"
git-cliff = "latest"


[tasks.setup]
description = "Install dependencies, configure git hooks, bootstrap local agent config"
depends = ["setup-python", "setup-hooks", "setup-claude-local"]

[tasks.setup-python]
dir = "python"
run = "mise run setup"

[tasks.setup-hooks]
description = "Point git at .githooks/ so the pre-push linter is active"
run = "git config core.hooksPath .githooks"

[tasks.setup-claude-local]
description = "Bootstrap CLAUDE.local.md from example if not already present"
run = """
if [ ! -f CLAUDE.local.md ]; then
  cp CLAUDE.local.md.example CLAUDE.local.md
  echo "Created CLAUDE.local.md from example. Replace with symlink to your sidecar repo."
fi
"""

[tasks.lint]
description = "Lint all subprojects"
depends = ["lint-python"]

[tasks.lint-python]
dir = "python"
run = "mise run lint"

[tasks.format]
description = "Format all subprojects"
depends = ["format-python"]

[tasks.format-python]
dir = "python"
run = "mise run format"

[tasks.typecheck]
description = "Type-check all subprojects"
depends = ["typecheck-python"]

[tasks.typecheck-python]
dir = "python"
run = "mise run typecheck"

[tasks.test]
description = "Run tests in all subprojects"
depends = ["test-haskell", "test-python"]

[tasks.test-haskell]
dir = "haskell"
run = "mise run test"

[tasks.test-python]
dir = "python"
run = "mise run test"

[tasks.container-build]
description = "Build the Python-only CI/dev image (ADR 0021). ENGINE=docker to override."
# TMPDIR points at disk: rootless podman commits layers via $TMPDIR, and a
# small /run/user tmpfs overflows on the torch layer.
env = { ENGINE = "podman", TMPDIR = "/var/tmp" }
run = "$ENGINE build -t pi-agent-space:ci -f Containerfile ."

[tasks.container-test]
description = "Run the CI loop (lint + typecheck + unit suite) inside the image (ADR 0021)."
env = { ENGINE = "podman", TMPDIR = "/var/tmp" }
depends = ["container-build"]
run = "$ENGINE run --rm pi-agent-space:ci"

[tasks.build]
description = "Build all subprojects"
depends = ["build-haskell", "build-python"]

[tasks.build-haskell]
dir = "haskell"
run = "mise run build"

[tasks.build-python]
dir = "python"
run = "mise run build"

[tasks.changelog]
description = "Regenerate CHANGELOG.md from conventional commits via git-cliff"
run = "git-cliff --output CHANGELOG.md"

[tasks."docs:build"]
description = "Render architecture docs to PDF in docs/gen/ via pandoc + mermaid-filter"
run = """
mkdir -p docs/gen
for src in docs/architecture/ARCHITECTURE.md docs/architecture/haskell.md docs/architecture/modeling-external-architectures.md; do
  out="docs/gen/$(basename "$src" .md).pdf"
  pandoc "$src" \
    --standalone \
    --filter mermaid-filter \
    --css=https://b.enjam.info/panam/styling.css \
    --pdf-engine=weasyprint \
    -o "$out"
done
"""
