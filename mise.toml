[tools]
claude = "latest"
gemini = "latest"
pandoc = "latest"
"pipx:weasyprint" = "latest"
"aqua:gastownhall/beads" = "latest"


[tasks.setup]
description = "Install dependencies in all subprojects"
depends = ["setup-python"]

[tasks.setup-python]
dir = "python"
run = "mise run setup"

[tasks.lint]
description = "Lint all subprojects"
depends = ["lint-python"]

[tasks.lint-python]
dir = "python"
run = "mise run lint"

[tasks.format]
description = "Format all subprojects"
depends = ["format-python"]

[tasks.format-python]
dir = "python"
run = "mise run format"

[tasks.typecheck]
description = "Type-check all subprojects"
depends = ["typecheck-python"]

[tasks.typecheck-python]
dir = "python"
run = "mise run typecheck"

[tasks.test]
description = "Run tests in all subprojects"
depends = ["test-haskell", "test-python"]

[tasks.test-haskell]
dir = "haskell"
run = "mise run test"

[tasks.test-python]
dir = "python"
run = "mise run test"

[tasks.build]
description = "Build all subprojects"
depends = ["build-haskell", "build-python"]

[tasks.build-haskell]
dir = "haskell"
run = "mise run build"

[tasks.build-python]
dir = "python"
run = "mise run build"

[tasks."docs:build"]
description = "Render architecture docs to PDF in docs/gen/ via pandoc + mermaid-filter"
run = """
mkdir -p docs/gen
for src in docs/architecture/ARCHITECTURE.md docs/architecture/haskell.md docs/architecture/modeling-external-architectures.md; do
  out="docs/gen/$(basename "$src" .md).pdf"
  pandoc "$src" \
    --standalone \
    --filter mermaid-filter \
    --css=https://b.enjam.info/panam/styling.css \
    --pdf-engine=weasyprint \
    -o "$out"
done
"""
