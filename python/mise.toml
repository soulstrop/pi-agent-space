# Concrete pins kill `latest` drift; exact versions + per-platform checksums
# live in mise.lock (the reproducibility substrate the container builds on —
# ADR 0021). Bump deliberately, then `mise lock` to refresh checksums.
[tools]
python = "3.13"
ruff = "0.15.16"
ty = "0.0.44"
uv = "0.11.19"

[tasks.setup]
description = "Install Python project dependencies (incl. dev)"
run = "uv sync"

[tasks.lint]
description = "Lint Python sources with ruff"
run = "uv run ruff check ."

[tasks.format]
description = "Format Python sources with ruff (applies lint auto-fixes too)"
run = [
    "uv run ruff check --fix .",
    "uv run ruff format .",
]

[tasks.typecheck]
description = "Type-check Python sources with ty"
run = "uv run ty check"

[tasks.test]
description = "Run Python tests"
run = "uv run pytest"

[tasks.test-acceptance-fast]
description = "Run minimal-spend real-Pi acceptance tests (1 trial, 0 retries, 1 problem; ADR 0010)"
run = "uv run pytest -m acceptance_fast"

[tasks.test-acceptance-full]
description = "Run production-default real-Pi acceptance tests (ADR 0010)"
run = "uv run pytest -m acceptance_full"

[tasks.test-acceptance]
description = "Run both fast and full real-Pi acceptance tests (ADR 0010)"
run = "uv run pytest -m 'acceptance_fast or acceptance_full'"

[tasks.build]
description = "Build Python project"
run = "uv build"
